            float: right;

        .markdown-content h2 {

            margin: 1.2rem 0 0.8rem;

        .markdown-content p {

            margin: 0.8rem 0;
            line-height: 1.8;
            text-align: justify;
        }

        .markdown-content ul,
        .markdown-content ol {
            margin: 0.8rem 0 0.8rem 2rem;
        }

        /* 让无序列表显示小圆点 */
        .markdown-content ul {
            list-style-type: disc;
        }

        /* 有序列表显示数字（保持默认） */
        .markdown-content ol {
            list-style-type: decimal;
        }

            margin: 0.4rem 0;
            line-height: 1.8;

        }

        .markdown-content code {
            background: #f3f4f6;
            padding: 0.2rem 0.4rem;

        }

        .markdown-content pre {
            background: #f3f4f6;
            padding: 1rem;
            border-radius: 4px;
            overflow-x: auto;

            text-align: justify;
        }

        /* 控制 Markdown 段落中图片的样式 */

            height: auto;
            margin: 2rem auto;
            display: block;
            max-width: 100%;
        }
    </style>

    <script>
        // 解析Markdown的Frontmatter（和列表页共用逻辑）
        function parseFrontmatter(markdownContent) {
            const frontmatterRegex = /^---\s*([\s\S]*?)\s*---/;
            const match = frontmatterRegex.exec(markdownContent);
            if (!match) return { frontmatter: {}, content: markdownContent };

            const frontmatterStr = match[1];
            const content = markdownContent.replace(frontmatterRegex, '').trim();
            const frontmatter = {};

            frontmatterStr.split('\n').forEach(line => {
                const [key, ...valueParts] = line.split(':').map(item => item.trim());
                if (key && valueParts.length) {
                    frontmatter[key] = valueParts.join(':');
                }
            });

            return { frontmatter, content };
        }

        // 获取URL参数（news_id）
        function getUrlParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        // 加载新闻详情
        async function loadNewsDetail() {
            const container = document.getElementById('news-detail-container');
            const news_id = getUrlParam('news_id');

            if (!news_id) {
                container.innerHTML = `<div class="text-center text-red-500 py-10">无效的新闻链接</div>`;
                return;
            }

            try {
                // 1. 加载index.md
                const mdRes = await fetch(`news/${news_id}/index.md`);
                if (!mdRes.ok) throw new Error('加载新闻内容失败');
                const mdContent = await mdRes.text();
                const { frontmatter, content } = parseFrontmatter(mdContent);

                // 2. 解析Markdown正文
                const parsedContent = marked.parse(content);

                document.title = `${frontmatter.title} - 能源智能计算课题组@XMU`;

                // 3. 拼接详情页HTML
                const html = `
                    <!-- 新闻标题/日期/标签 -->
                    <div class="mb-6">
                        <h1 class="text-3xl font-bold text-labPrimary mb-6">${frontmatter.title || '无标题新闻'}</h1>
                        <div class="flex flex-wrap text-gray-600">
                            <span class="text-xl mr-8">
                                <i class="fa-solid fa-calendar mr-2"></i>发布日期：${frontmatter.date || '未知日期'}
                            </span>
                            <span class="text-xl">
                                <i class="fa-solid fa-tag mr-2"></i>${frontmatter.tag || '未知标签'}
                            </span>
                        </div>
                    </div>
                    <div class="markdown-content text-gray-800">
                        ${parsedContent}
                    </div>
                `;

                container.innerHTML = html;
            } catch (error) {
                console.error('加载新闻详情失败：', error);
                container.innerHTML = `<div class="text-center text-red-500 py-10">新闻详情加载失败</div>`;
            }
        }

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', loadNewsDetail);
    </script>
